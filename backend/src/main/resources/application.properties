server.port=8080

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.access-secret=${JWT_ACCESS_SECRET:my-access-secret-key-change-in-production-1234567890}
jwt.refresh-secret=${JWT_REFRESH_SECRET:my-refresh-secret-key-change-in-production-0987654321}
jwt.access-expiration-ms=3600000
jwt.refresh-expiration-ms=86400000
